<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./grid.css">
</head>
<body>
    <main class="container">
        <div class="header">
            <img src="../assets/logo.png" alt="logo" class="logo">
            <h1 class="title">회원 가입을 위해 정보를 입력해주세요</h1>
        </div>

        <div class="input">
            <p class="label">* 이메일</p>
            <div class="blueline"></div>
        </div>

        <div class="input">
            <p class="label">* 이름</p>
            <div class="line"></div>
        </div>

        <div class="input">
            <p class="label">* 비밀번호</p>
            <div class="line"></div>
        </div>

        <div class="input">
            <p class="label">* 비밀번호 확인</p>
            <div class="line"></div>
        </div>

        <div class="gender">
            <div class="gender-choice">
                <div class="circle"></div>
                <span>여성</span>
            </div>
            <div class="gender-choice">
                <div class="circle"></div>
                <span>남성</span>
            </div>
        </div>

        <div class="agree-check">
            <div class="checkbox"></div>
            <p>이용약관 개인정보 수집 및 이용, 마케팅 활용 선택에 모두 동의합니다.</p>
        </div>

        <div class="line2"></div>

        <button class="join">가입하기</button>
    </main>
</body>
</html>
